    <script>
      function openFile(callback) {
        const input = document.getElementById('fileInput');
        input.value = '';
        input.onchange = (event) => {
          const file = event.target.files[0];
          const reader = new FileReader();
          reader.onload = () => {
            const data = new Uint8Array(reader.result);
            const buffer = Module._malloc(data.length);
            Module.HEAPU8.set(data, buffer);
            Module.ccall('LoadFileCallback', null, ['number', 'number'], [buffer, data.length]);
            Module._free(buffer);
          };
          reader.readAsArrayBuffer(file);
        };
        input.click();
      }
    </script>

    <script async type="text/javascript" src="main.js"></script>    
    
    <script>
      window.onload = () => {
        const canvas = document.getElementById('canvas');
        canvas.setAttribute("tabindex", "0");
        canvas.focus();

        document.addEventListener("keydown", function(e) {
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            e.preventDefault();
          }
        });

        // Трюк для скрытия адресной строки на Android Chrome
        function hideAddressBar() {
          if (window.scrollY === 0) {
            window.scrollTo(0, 1);
          }
        }

        function getViewportSize() {
          // visualViewport точнее учитывает клавиатуру и браузерный chrome на мобильных
          if (window.visualViewport) {
            return {
              w: window.visualViewport.width,
              h: window.visualViewport.height
            };
          }
          return {
            w: window.innerWidth,
            h: window.innerHeight
          };
        }

        function fitCanvas() {
		  const naturalW = canvas.width;
		  const naturalH = canvas.height;
		  if (!naturalW || !naturalH) return;

		  const wrapper = document.getElementById('canvas-wrapper');
		  const w = wrapper.clientWidth;
		  const h = wrapper.clientHeight;

		  const scale = Math.min(w / naturalW, h / naturalH);

		  canvas.style.width  = Math.floor(naturalW * scale) + "px";
		  canvas.style.height = Math.floor(naturalH * scale) + "px";
		}

        fitCanvas();

        // resize — срабатывает в том числе когда браузер прячет/показывает адресную строку
        window.addEventListener("resize", fitCanvas);

        // visualViewport более точен на мобильных
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", fitCanvas);
        }

        // Поворот экрана: даём браузеру 300ms пересчитать размеры
        window.addEventListener("orientationchange", () => {
          setTimeout(() => {
            hideAddressBar();
            fitCanvas();
          }, 300);
        });

        // Emscripten выставляет width/height асинхронно
        const observer = new MutationObserver(() => setTimeout(fitCanvas, 0));
        observer.observe(canvas, { attributes: true, attributeFilter: ["width", "height"] });

        // Первоначальное скрытие адресной строки
        setTimeout(hideAddressBar, 100);
      };
    </script>
