    <script async type="text/javascript" src="main.js"></script>    
    
    <script>
      window.onload = () => {
        const canvas = document.getElementsByTagName("canvas")[0];
        canvas.setAttribute("tabindex", "0");
        canvas.focus();

        document.addEventListener("keydown", function(e) {
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            e.preventDefault();
          }
        });

        function fitCanvas() {
          const naturalW = canvas.width;
          const naturalH = canvas.height;

          if (!naturalW || !naturalH) return;

          const winW = window.innerWidth;
          const winH = window.innerHeight;

          const scale = Math.min(winW / naturalW, winH / naturalH);

          canvas.style.width  = Math.floor(naturalW * scale) + "px";
          canvas.style.height = Math.floor(naturalH * scale) + "px";
        }

        fitCanvas();
        window.addEventListener("resize", fitCanvas);
        window.addEventListener("orientationchange", () => setTimeout(fitCanvas, 100));

        const observer = new MutationObserver(() => setTimeout(fitCanvas, 0));
        observer.observe(canvas, { attributes: true, attributeFilter: ["width", "height"] });
      };
    </script>
