    <input type="file" id="fileInput" style="display:none" />

    <script>
      function openFile(callback) {
        const input = document.getElementById('fileInput');
        input.value = '';
        input.onchange = (event) => {
          const file = event.target.files[0];
          const reader = new FileReader();
          reader.onload = () => {
            const data = new Uint8Array(reader.result);
            const buffer = Module._malloc(data.length);
            Module.HEAPU8.set(data, buffer);
            Module.ccall('LoadFileCallback', null, ['number', 'number'], [buffer, data.length]);
            Module._free(buffer);
          };
          reader.readAsArrayBuffer(file);
        };
        input.click();
      }
    </script>

    <script>
      async function pasteFromClipboard() {
        try {
          const text = await navigator.clipboard.readText();
          const lengthBytes = lengthBytesUTF8(text) + 1;
          const stringOnWasmHeap = Module._malloc(lengthBytes);
          stringToUTF8(text, stringOnWasmHeap, lengthBytes);
          Module.ccall('OnClipboardPaste', null, ['number'], [stringOnWasmHeap]);
        } catch (err) {
          console.error('Ошибка при вставке:', err);
        }
      }
    </script>

    <script>

    <script async type="text/javascript" src="main.js"></script>

    <script>
      window.onload = () => {
        const canvas = document.getElementById('canvas');
        const wrapper = document.getElementById('canvas-wrapper');

        canvas.setAttribute("tabindex", "0");
        canvas.focus();

        // Стрелки не скроллят страницу
        document.addEventListener("keydown", function(e) {
          if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
            e.preventDefault();
          }
        });

        // --- Fullscreen API ---
        function goFullscreen() {
          const el = document.documentElement;
          const fn = el.requestFullscreen
                   || el.webkitRequestFullscreen
                   || el.mozRequestFullScreen
                   || el.msRequestFullscreen;
          if (fn) fn.call(el);
        }

        document.getElementById('btn-fullscreen').addEventListener('click', goFullscreen);

        // Автоматически уходим в fullscreen при первом тапе (один раз)
        let fullscreenTriggered = false;
        canvas.addEventListener('touchstart', function autoFullscreen() {
          if (!fullscreenTriggered && !document.fullscreenElement) {
            fullscreenTriggered = true;
            goFullscreen();
          }
          canvas.removeEventListener('touchstart', autoFullscreen);
        }, { once: true });

        // --- PWA install prompt (Android Chrome) ---
        let deferredInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredInstallPrompt = e;
          // Можно показать свою кнопку "Установить игру"
        });

        // Вызывай эту функцию из C если хочешь показать промпт установки:
        // Module.ccall или просто window.promptPWAInstall()
        window.promptPWAInstall = () => {
          if (deferredInstallPrompt) deferredInstallPrompt.prompt();
        };

        // --- Подгонка canvas под видимую область ---
        function fitCanvas() {
          const naturalW = canvas.width;
          const naturalH = canvas.height;
          if (!naturalW || !naturalH) return;

          const w = wrapper.clientWidth;
          const h = wrapper.clientHeight;
          const scale = Math.min(w / naturalW, h / naturalH);

          canvas.style.width  = Math.floor(naturalW * scale) + "px";
          canvas.style.height = Math.floor(naturalH * scale) + "px";
        }

        fitCanvas();
        window.addEventListener("resize", fitCanvas);
        window.addEventListener("orientationchange", () => setTimeout(fitCanvas, 300));
        document.addEventListener("fullscreenchange", () => setTimeout(fitCanvas, 100));

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", fitCanvas);
        }

        // Emscripten выставляет width/height асинхронно
        const observer = new MutationObserver(() => setTimeout(fitCanvas, 0));
        observer.observe(canvas, { attributes: true, attributeFilter: ["width", "height"] });
      };
    </script>
